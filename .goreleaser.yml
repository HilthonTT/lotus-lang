project_name: lotus

builds:
  - id: lotus
    main: ./lang
    binary: lotus
    ldflags:
      - -X github.com/hilthontt/lotus/version.GitCommit={{.ShortCommit}}
      - -X github.com/hilthontt/lotus/version.BuildTime={{.Date}}
      - -X github.com/hilthontt/lotus/version.Version={{.Version}}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "lotus_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: HilthonTT
    name: lotus-lang
  draft: false
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
